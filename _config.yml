# Site settings
title: Citizen Pass
description: U.S. Citizenship Test Prep — Civics, Reading, Writing, N-400 & Mock Interview
url: https://citizenpass.us
email: support@citizenpass.us

# Analytics
google_analytics: G-T64Z2T7ERC

# Build settings
markdown: kramdown
permalink: pretty

# Files to exclude from the build
