<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Manager — Citizen Pass</title>
  <link rel="icon" type="image/png" href="/icon.png">
</head>
<body>
  <!-- Decap CMS — must be in body, not head -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <!-- Customize login button text from "Login with GitHub" to "Admin Access" -->
  <script>
    const observer = new MutationObserver(() => {
      document.querySelectorAll('button').forEach(btn => {
        if (btn.textContent.trim() === 'Login with GitHub') {
          btn.textContent = 'Admin Access';
        }
      });
    });
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
